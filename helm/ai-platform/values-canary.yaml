appName: ai-platform-canary
version: v2

image:
  repository: 502759712845.dkr.ecr.us-east-1.amazonaws.com/ai-platform
  tag: sha-da4f940
  pullPolicy: Always

# 1 canary replica alongside 1 stable = 50% traffic split
# To reduce to 10%: set stable replicaCount: 9, canary replicaCount: 1
replicaCount: 1

service:
  enabled: false  # canary shares the existing Service owned by ArgoCD
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  host: localhost

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: APP_ENV
    value: "development"
  - name: APP_LOG_LEVEL
    value: "debug"
  - name: LLM_BASE_URL
    value: "https://api.groq.com/openai/v1"
  # Canary uses faster/cheaper model — simulating a model version upgrade
  - name: LLM_MODEL
    value: "llama-3.1-8b-instant"
  - name: QDRANT_COLLECTION
    value: "faq_documents"
  - name: CACHE_TTL_SECONDS
    value: "3600"
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://tempo.monitoring.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "ai-platform-canary"
