apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-platform-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ai-platform.json: |
    {
      "title": "AI Customer Support Platform",
      "uid": "ai-platform",
      "tags": ["ai-platform", "fastapi"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "API Latency — p95 (ms)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"ai-platform\"}[5m])) by (le, handler)) * 1000",
              "legendFormat": "p95 {{ handler }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 2,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"ai-platform\"}[5m])) by (handler, status_code)",
              "legendFormat": "{{ handler }} {{ status_code }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "id": 3,
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"ai-platform\", status_code=~\"4..|5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"ai-platform\"}[5m])) * 100",
              "legendFormat": "error rate %"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "thresholds": {
              "steps": [
                { "color": "green", "value": 0 },
                { "color": "yellow", "value": 1 },
                { "color": "red", "value": 5 }
              ]
            }}
          }
        },
        {
          "id": 4,
          "title": "AI Response Time — p95 (ms)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"ai-platform\", handler=~\"/v1/chat|/v1/rag\"}[5m])) by (le, handler)) * 1000",
              "legendFormat": "p95 {{ handler }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "ms" }
          }
        },
        {
          "id": 5,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"ai-platform\", container=\"ai-platform\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "id": 6,
          "title": "Pod Memory Usage (MB)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"ai-platform\", container=\"ai-platform\"}) by (pod) / 1024 / 1024",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "MB" }
          }
        },
        {
          "id": 7,
          "title": "Active Pods",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"ai-platform\", phase=\"Running\"})"
            }
          ]
        },
        {
          "id": 8,
          "title": "Uptime",
          "type": "stat",
          "gridPos": { "x": 6, "y": 24, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "avg(kube_pod_status_ready{namespace=\"ai-platform\", condition=\"true\"}) * 100",
              "legendFormat": "ready %"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent" }
          }
        }
      ]
    }
