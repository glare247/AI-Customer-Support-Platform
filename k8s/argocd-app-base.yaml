apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-platform-base
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/glare247/AI-Customer-Support-Platform.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
